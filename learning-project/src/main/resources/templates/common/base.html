<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: '儿童学习平台'">儿童学习平台</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>
    <nav th:fragment="nav" class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">儿童学习平台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activeMenu} == 'poetry' ? 'active' : ''" href="/poetry/list">诗词</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activeMenu} == 'character' ? 'active' : ''" href="/character/list">识字</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activeMenu} == 'english' ? 'active' : ''" href="/english/list">英文</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activeMenu} == 'pinyin' ? 'active' : ''" href="/pinyin/list">拼音</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activeMenu} == 'idiom' ? 'active' : ''" href="/idiom/list">成语</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activeMenu} == 'drawing' ? 'active' : ''" href="/drawing/list">画画</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activeMenu} == 'math' ? 'active' : ''" href="/math/list">数学</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <footer th:fragment="footer" class="bg-light text-center mt-4 py-3">
        <p>© 2026 儿童学习平台</p>
    </footer>
    
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
