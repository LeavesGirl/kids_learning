<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词详情</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>
    <!-- 引入导航栏 -->
    <div th:replace="common/header :: nav"></div>

    <div class="container mt-4">
        <h1>诗词详情</h1>
        <div class="card">
            <div class="card-body">
                <h2 class="card-title" th:text="${poetry.title}"></h2>
                <p class="card-text" th:text="${poetry.author}"></p>
                <div class="mt-4">
                    <h3>内容</h3>
                    <pre class="card-text" th:text="${poetry.content}"></pre>
                </div>
                <div class="mt-4">
                    <h3>解释</h3>
                    <p class="card-text" th:text="${poetry.explanation}"></p>
                </div>
                <a th:href="@{/poetry/list}" class="btn btn-primary mt-4">返回列表</a>
            </div>
        </div>
    </div>

    <!-- 引入底部 -->
    <div th:replace="common/footer :: footer"></div>
</body>
</html>
