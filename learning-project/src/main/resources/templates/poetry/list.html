<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词列表</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        /* 幼儿学习系统颜色变量 - 鲜艳但柔和 */
        :root {
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --accent-color: #FFD166;
            --text-color: #292F36;
            --light-text: #6C757D;
            --light-bg: #FFFFFF;
            --border-color: #E6E6E6;
            --hover-bg: #F8F9FA;
            --card-bg: #FFFFFF;
        }

        /* 导入可爱的字体 */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #F9F7F7;
            color: var(--text-color);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="2" fill="%23FFE5E5" opacity="0.5"/><circle cx="25" cy="25" r="1.5" fill="%23E5F5F5" opacity="0.5"/><circle cx="75" cy="75" r="1.5" fill="%23FFF5E5" opacity="0.5"/></svg>');
        }

        .container-lg {
            max-width: 1200px;
        }

        .list-title {
            text-align: center;
            color: var(--primary-color);
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            font-family: 'Nunito', sans-serif;
        }

        /* 搜索框样式 */
        .input-group {
            max-width: 500px;
            margin: 0 auto 2rem;
        }

        .form-control {
            border-radius: 25px 0 0 25px;
            border: 2px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            font-size: 1.1rem;
            box-shadow: none;
            background-color: white;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(255, 107, 107, 0.2);
        }

        .btn-primary {
            border-radius: 0 25px 25px 0;
            background-color: var(--primary-color);
            border: none;
            padding: 0 2rem;
            font-weight: 600;
            box-shadow: 0 4px 8px rgba(255, 107, 107, 0.3);
            font-size: 1.1rem;
        }

        .btn-primary:hover {
            background-color: #FF5252;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(255, 107, 107, 0.4);
        }

        /* 卡片样式 - 幼儿友好设计 */
        .poetry-card {
            border: 2px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--card-bg);
            overflow: hidden;
            position: relative;
        }

        /* 卡片顶部装饰 */
        .poetry-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
        }

        .poetry-card:hover {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        /* 卡片内容布局 */
        .poetry-card .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1.75rem;
        }

        /* 卡片顶部 - 标题和作者信息 */
        .card-header {
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .poetry-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            text-align: left;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .poetry-meta {
            font-size: 0.9rem;
            color: var(--light-text);
            font-weight: 400;
            text-align: left;
            margin-bottom: 0.5rem;
        }

        /* 标签样式 */
        .poetry-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .poetry-tag {
            font-size: 0.8rem;
            padding: 0.25rem 0.75rem;
            background-color: #F0F0F0;
            border-radius: 12px;
            color: var(--light-text);
        }

        /* 卡片中间 - 诗词内容 */
        .card-content {
            flex: 1;
            margin-bottom: 1.5rem;
        }

        .poetry-content {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-color);
            white-space: pre-line;
            text-align: left;
            font-family: 'Noto Sans SC', sans-serif;
        }

        /* 卡片底部 - 操作按钮 */
        .card-footer {
            margin-top: auto;
        }

        .poetry-card .btn {
            width: 100%;
            background-color: var(--accent-color);
            border: none;
            color: var(--text-color);
            font-weight: 600;
            padding: 0.8rem;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            box-shadow: 0 4px 8px rgba(255, 209, 102, 0.3);
        }

        .poetry-card .btn:hover {
            background-color: #FFC107;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(255, 209, 102, 0.4);
        }

        /* 分页样式 */
        .pagination {
            margin-top: 3rem;
        }

        .page-item {
            margin: 0 5px;
        }

        .page-link {
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--border-color);
            color: var(--text-color);
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .page-item.active .page-link {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .page-link:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: var(--text-color);
            transform: scale(1.1);
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .list-title {
                font-size: 2rem;
            }

            .poetry-title {
                font-size: 1.3rem;
            }

            .poetry-content {
                font-size: 1rem;
            }

            .poetry-card .card-body {
                padding: 1.25rem;
            }
        }

        /* 标签容器样式 */
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        /* 标签按钮样式 */
        .tag-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background-color: white;
            color: var(--text-color);
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tag-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .tag-btn.active {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        /* 加载动画 */
        #loading {
            margin: 3rem 0;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            border-width: 4px;
            color: var(--primary-color);
        }

        /* 装饰元素 */
        .decorative-element {
            position: fixed;
            width: 100px;
            height: 100px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="%23FFE5E5" opacity="0.3"/><circle cx="30" cy="30" r="5" fill="%23FF6B6B" opacity="0.5"/><circle cx="70" cy="70" r="5" fill="%234ECDC4" opacity="0.5"/><circle cx="30" cy="70" r="5" fill="%23FFD166" opacity="0.5"/><circle cx="70" cy="30" r="5" fill="%23FF6B6B" opacity="0.5"/></svg>');
            background-repeat: no-repeat;
            background-size: contain;
            pointer-events: none;
            z-index: -1;
        }

        .decorative-element.top-left {
            top: 20px;
            left: 20px;
        }

        .decorative-element.bottom-right {
            bottom: 20px;
            right: 20px;
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
<!-- 引入导航栏 -->
<div th:replace="common/header :: nav"></div>

<div class="container-lg mt-4">
    <h1 class="list-title">诗词列表</h1>

    <!-- 搜索表单 -->
    <div class="mb-4">
        <div class="row">
            <div class="col-md-6">
                <div class="input-group">
                    <input type="text" id="keyword" class="form-control" placeholder="搜索诗词或作者">
                    <button type="button" id="searchBtn" class="btn btn-primary">搜索</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 标签筛选 -->

    <!-- 数据将通过JavaScript动态加载 -->
    <div class="mb-3" th:each="tag : ${tags}">
        <h6 class="text-muted mb-2" th:text="${tag.key}"></h6>
        <div class="tag-container">
            <button type="button" class="tag-btn" data-type="author" data-value="">全部</button>
            <th:block th:each="tagVal : ${tag.value}">
                <button type="button" class="tag-btn" th:data-type="${key}" th:data-value="${tagVal.id}"
                        th:text="${tagVal.name}"></button>
            </th:block>
        </div>
    </div>

    <!-- 数据容器 -->
    <div id="data-container" class="row row-cols-1 row-cols-md-2 row-cols-lg-5 g-4">
        <!-- 数据将通过JavaScript动态加载 -->
    </div>
    <!-- 加载状态 -->
    <div id="loading" class="mt-4 text-center" style="display: none;">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">加载中...</span>
        </div>
    </div>

    <!-- 分页 -->
    <div class="mt-4">
        <nav aria-label="Page navigation">
            <ul id="pagination" class="pagination justify-content-center">
                <!-- 分页将通过JavaScript动态生成 -->
            </ul>
        </nav>
    </div>
</div>

<!-- 引入底部 -->
<div th:replace="common/footer :: footer"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script>
    // 全局变量
    let currentPage = 1;
    let keyword = '';
    let filters = {
        dynasty: '',
        author: '',
        genre: '',
        theme: ''
    };

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function () {
        loadData();

        // 搜索按钮点击事件
        document.getElementById('searchBtn').addEventListener('click', function () {
            keyword = document.getElementById('keyword').value;
            currentPage = 1;
            loadData();
        });

        // 回车键搜索
        document.getElementById('keyword').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                keyword = document.getElementById('keyword').value;
                currentPage = 1;
                loadData();
            }
        });

        // 标签点击事件
        document.querySelectorAll('.tag-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                const type = this.getAttribute('data-type');
                const value = this.getAttribute('data-value');

                // 更新筛选条件
                filters[type] = value;
                currentPage = 1;

                // 更新标签状态
                document.querySelectorAll(`.tag-btn[data-type="${type}"]`).forEach(b => {
                    b.classList.remove('active');
                });
                this.classList.add('active');

                // 加载数据
                loadData();
            });
        });
    });

    // 加载数据
    function loadData() {
        const dataContainer = document.getElementById('data-container');
        const loading = document.getElementById('loading');
        const pagination = document.getElementById('pagination');

        // 显示加载状态
        loading.style.display = 'block';
        dataContainer.innerHTML = '';
        pagination.innerHTML = '';

        // 构建查询参数
        let queryParams = `pageNum=${currentPage}&keyword=${encodeURIComponent(keyword)}`;
        if (filters.dynasty) queryParams += `&dynasty=${encodeURIComponent(filters.dynasty)}`;
        if (filters.author) queryParams += `&author=${encodeURIComponent(filters.author)}`;
        if (filters.genre) queryParams += `&genre=${encodeURIComponent(filters.genre)}`;
        if (filters.theme) queryParams += `&theme=${encodeURIComponent(filters.theme)}`;

        // 发送异步请求
        fetch(`/poetry/list/data?${queryParams}`)
            .then(response => response.json())
            .then(data => {
                // 隐藏加载状态
                loading.style.display = 'none';

                // 渲染数据
                if (data.records.length > 0) {
                    data.records.forEach(poetry => {
                        const col = document.createElement('div');
                        col.className = 'col';
                        col.innerHTML = `
                                <div class="poetry-card">
                                    <div class="card-body">
                                        <!-- 卡片顶部 - 标题和作者信息 -->
                                        <div class="card-header">
                                            <h5 class="poetry-title">${poetry.title}</h5>
                                            <p class="poetry-meta">${poetry.dynasty}·${poetry.author}</p>
                                            <!-- 标签 -->
                                            <div class="poetry-tags">
                                                <span class="poetry-tag">唐诗三百首</span>
                                                <span class="poetry-tag">${poetry.dynasty}</span>
                                            </div>
                                        </div>
                                        
                                        <!-- 卡片中间 - 诗词内容 -->
                                        <div class="card-content">
                                            <div class="poetry-content">${poetry.content.replace(/。/g, '。\n')}</div>
                                        </div>
                                        
                                        <!-- 卡片底部 - 操作按钮 -->
                                        <div class="card-footer">
                                            <a href="/poetry/detail/${poetry.id}" class="btn btn-primary">查看详情</a>
                                        </div>
                                    </div>
                                </div>
                            `;
                        dataContainer.appendChild(col);
                    });
                } else {
                    dataContainer.innerHTML = `
                            <div class="col-12 text-center">
                                <p class="text-muted">暂无数据</p>
                            </div>
                        `;
                }

                // 渲染分页
                renderPagination(data);
            })
            .catch(error => {
                console.error('加载数据失败:', error);
                loading.style.display = 'none';
                dataContainer.innerHTML = `
                        <div class="col-12 text-center">
                            <p class="text-danger">加载失败，请重试</p>
                        </div>
                    `;
            });
    }

    // 渲染分页
    function renderPagination(data) {
        const pagination = document.getElementById('pagination');

        // 上一页
        const prevLi = document.createElement('li');
        prevLi.className = `page-item ${data.current === 1 ? 'disabled' : ''}`;
        prevLi.innerHTML = `
                <a class="page-link" href="#" aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            `;
        if (data.current > 1) {
            prevLi.querySelector('a').addEventListener('click', function (e) {
                e.preventDefault();
                currentPage = data.current - 1;
                loadData();
            });
        }
        pagination.appendChild(prevLi);

        // 页码
        for (let i = 1; i <= data.pages; i++) {
            const li = document.createElement('li');
            li.className = `page-item ${i === data.current ? 'active' : ''}`;
            li.innerHTML = `<a class="page-link" href="#">${i}</a>`;
            if (i !== data.current) {
                li.querySelector('a').addEventListener('click', function (e) {
                    e.preventDefault();
                    currentPage = i;
                    loadData();
                });
            }
            pagination.appendChild(li);
        }

        // 下一页
        const nextLi = document.createElement('li');
        nextLi.className = `page-item ${data.current === data.pages ? 'disabled' : ''}`;
        nextLi.innerHTML = `
                <a class="page-link" href="#" aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            `;
        if (data.current < data.pages) {
            nextLi.querySelector('a').addEventListener('click', function (e) {
                e.preventDefault();
                currentPage = data.current + 1;
                loadData();
            });
        }
        pagination.appendChild(nextLi);
    }
</script>
<!-- 装饰元素 -->
<div class="decorative-element top-left"></div>
<div class="decorative-element bottom-right"></div>
</body>
</html>
