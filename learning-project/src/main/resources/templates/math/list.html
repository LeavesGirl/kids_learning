<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学列表</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>
    <!-- 引入导航栏 -->
    <div th:replace="common/header :: nav"></div>

    <div class="container-lg mt-4">
        <h1 class="list-title">数学列表</h1>
        
        <!-- 搜索表单 -->
        <div class="mb-4">
            <div class="row">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" id="keyword" class="form-control" placeholder="搜索标题或内容">
                        <button type="button" id="searchBtn" class="btn btn-primary">搜索</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 数据容器 -->
        <div id="data-container" class="row row-cols-1 row-cols-md-2 row-cols-lg-5 g-4">
            <!-- 数据将通过JavaScript动态加载 -->
        </div>
        
        <!-- 加载状态 -->
        <div id="loading" class="mt-4 text-center" style="display: none;">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">加载中...</span>
            </div>
        </div>
        
        <!-- 分页 -->
        <div class="mt-4">
            <nav aria-label="Page navigation">
                <ul id="pagination" class="pagination justify-content-center">
                    <!-- 分页将通过JavaScript动态生成 -->
                </ul>
            </nav>
        </div>
    </div>

    <!-- 引入底部 -->
    <div th:replace="common/footer :: footer"></div>
    
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script>
        // 全局变量
        let currentPage = 1;
        let keyword = '';
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            
            // 搜索按钮点击事件
            document.getElementById('searchBtn').addEventListener('click', function() {
                keyword = document.getElementById('keyword').value;
                currentPage = 1;
                loadData();
            });
            
            // 回车键搜索
            document.getElementById('keyword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    keyword = document.getElementById('keyword').value;
                    currentPage = 1;
                    loadData();
                }
            });
        });
        
        // 加载数据
        function loadData() {
            const dataContainer = document.getElementById('data-container');
            const loading = document.getElementById('loading');
            const pagination = document.getElementById('pagination');
            
            // 显示加载状态
            loading.style.display = 'block';
            dataContainer.innerHTML = '';
            pagination.innerHTML = '';
            
            // 发送异步请求
            fetch(`/math/list/data?pageNum=${currentPage}&keyword=${encodeURIComponent(keyword)}`)
                .then(response => response.json())
                .then(data => {
                    // 隐藏加载状态
                    loading.style.display = 'none';
                    
                    // 渲染数据
                    if (data.records.length > 0) {
                        data.records.forEach(math => {
                            const col = document.createElement('div');
                            col.className = 'col';
                            col.innerHTML = `
                                <div class="list-card">
                                    <div class="card-body">
                                        <h5 class="card-title">${math.title}</h5>
                                        <a href="/math/detail/${math.id}" class="btn btn-primary">查看详情</a>
                                    </div>
                                </div>
                            `;
                            dataContainer.appendChild(col);
                        });
                    } else {
                        dataContainer.innerHTML = `
                            <div class="col-12 text-center">
                                <p class="text-muted">暂无数据</p>
                            </div>
                        `;
                    }
                    
                    // 渲染分页
                    renderPagination(data);
                })
                .catch(error => {
                    console.error('加载数据失败:', error);
                    loading.style.display = 'none';
                    dataContainer.innerHTML = `
                        <div class="col-12 text-center">
                            <p class="text-danger">加载失败，请重试</p>
                        </div>
                    `;
                });
        }
        
        // 渲染分页
        function renderPagination(data) {
            const pagination = document.getElementById('pagination');
            
            // 上一页
            const prevLi = document.createElement('li');
            prevLi.className = `page-item ${data.current === 1 ? 'disabled' : ''}`;
            prevLi.innerHTML = `
                <a class="page-link" href="#" aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            `;
            if (data.current > 1) {
                prevLi.querySelector('a').addEventListener('click', function(e) {
                    e.preventDefault();
                    currentPage = data.current - 1;
                    loadData();
                });
            }
            pagination.appendChild(prevLi);
            
            // 页码
            for (let i = 1; i <= data.pages; i++) {
                const li = document.createElement('li');
                li.className = `page-item ${i === data.current ? 'active' : ''}`;
                li.innerHTML = `<a class="page-link" href="#">${i}</a>`;
                if (i !== data.current) {
                    li.querySelector('a').addEventListener('click', function(e) {
                        e.preventDefault();
                        currentPage = i;
                        loadData();
                    });
                }
                pagination.appendChild(li);
            }
            
            // 下一页
            const nextLi = document.createElement('li');
            nextLi.className = `page-item ${data.current === data.pages ? 'disabled' : ''}`;
            nextLi.innerHTML = `
                <a class="page-link" href="#" aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            `;
            if (data.current < data.pages) {
                nextLi.querySelector('a').addEventListener('click', function(e) {
                    e.preventDefault();
                    currentPage = data.current + 1;
                    loadData();
                });
            }
            pagination.appendChild(nextLi);
        }
    </script>
</body>
</html>
